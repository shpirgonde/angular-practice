<main class="login-wrapper">
    <div class="login-card">
        <header class="login-card__header">
            <h1 class="login-card__title">Log In</h1>
        </header>

        <form (submit)="onLogin($event)" class="login-form" #loginForm="ngForm">

            <div class="login-form__group">
                <label for="email" class="form-label">Email</label>
                <input class="form-input" name="email" type="email" id="email" placeholder="name@xxx.com" ngModel
                    required email>
            </div>

            <div class="login-form__group">
                <label for="password" class="form-label">Password</label>
                <input class="form-input" name="password" type="password" id="password" placeholder="••••••••" ngModel
                    required minlength="6">
            </div>

            <button class="login-form__button" type="submit" [disabled]="!loginForm.valid">Sign In</button>
        </form>

        <footer class="login-card__footer">
            <p>Dont have an account? <a routerLink="/signup">Sign Up</a></p>
        </footer>
    </div>
    <!-- <app-status-modal [message]="statusMessage()"></app-status-modal> -->
    <app-toaster />
</main>
